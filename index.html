<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/MUSA%20Logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Montserrat:wght@600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>MUSA</title>
    <meta name="description" content="The Music Undergraduate Students' Association at the UBC School of Music — academic advocacy, student well-being, and professional development for over 400 musicians." />

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="UBC MUSA" />
    <meta property="og:title" content="UBC MUSA — Music Undergraduate Students' Association" />
    <meta property="og:description" content="The official student government and community backbone for over 400 musicians at the UBC School of Music — academic advocacy, student well-being, and professional development." />
    <meta property="og:url" content="https://www.ubcmusa.ca/" />
    <meta property="og:image" content="https://www.ubcmusa.ca/images/optimized/hero-orchestra.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="UBC MUSA — Music Undergraduate Students' Association" />
    <meta name="twitter:description" content="The official student government and community backbone for over 400 musicians at the UBC School of Music." />
    <meta name="twitter:image" content="https://www.ubcmusa.ca/images/optimized/hero-orchestra.jpg" />
  </head>
  <body>
    <!-- Hidden static form so Netlify Forms detects "town-hall" at build time.
         The live form is rendered by React (src/components/TownHallForm.jsx). -->
    <form name="town-hall" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="firstName" />
      <input type="text" name="lastName" />
      <input type="email" name="email" />
      <input type="text" name="studentNumber" />
      <input type="text" name="areaOfStudy" />
      <textarea name="concern"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
